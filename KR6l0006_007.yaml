body:
  text: 尊者世友造宋天竺三藏求那跋陀羅共菩提耶舍譯分別攝品第六之四三世及三世說事十八界十二入五陰攝九智知除滅智六識識一切使使欲界苦苦苦十八界十二入五陰攝七智知除比智及滅道智六識識欲界一切使使色界變苦苦十四界十入五陰攝七智知除法智及滅道智四識識色界一切使使無色界行苦苦三界二入四陰攝六智知除法智知他心智及滅道智一識識無色界一切使使復次苦受苦苦苦一界一入一陰攝七智知除比智及滅道智一識識欲界一切使使樂受變苦苦一界一入一陰攝九智知除滅智一識識色界一切使使除欲界無漏緣疑及彼相應無明餘欲界一切使使不苦不樂受行苦苦一界一入一陰攝九智知除滅智一識識一切使使有覺有觀法八界二入四陰攝九智知除滅智一識識欲色二界一切使使無覺有觀法三界二入四陰攝九智知除滅智一識識欲色二界一切使使無覺無觀法十三界十二入五陰攝十智知六識識色無色界一切使使欲界有漏緣使使有覺有觀地十八界十二入五陰攝九智知除滅智六識識欲色二界一切使使無覺有觀地三界二入五陰攝九智知除滅智一識識色界一切遍使使及修斷使使無覺無觀地十一界十入五陰攝九智知除滅智四識識色無色界一切使使身業二界二入一陰攝八智知除知他心智及滅智二識識欲色二界一切遍使使及修斷使使如身業口業亦如是意業一界一入一陰攝九智知除滅智一識識一切使使善業三界二入二陰攝九智知除滅智三識識三界一切遍使使及修斷使使不善業三界三入二陰攝七智知除比智及滅道智三識識欲界一切使使無記業三界三入二陰攝八智知除滅道智三識識色無色界一切欲界二身見集斷一切遍使使及修斷使使學業一界一入二陰攝七智知除苦集滅智一識識使所不使如學業無學業亦如是非學非無學業三界三入二陰攝八智知除滅道智三識識一切使使見斷業一界一入一陰攝八智知除滅道智一識識見斷一切使使修斷業三界三入二陰攝八智知除滅道智三識識修斷一切使使及一切遍使使不斷業一界一入二陰攝七智知除苦集滅智一識識使所不使現法受業生受業後受業三界三入二陰攝八智知除滅道智三識識欲界一切使使色無色界一切遍使使及修斷使使樂受業三界三入二陰攝八智知除滅道智三識識欲色二界一切遍使使及修斷使使苦受業三界三入二陰攝七智知除比智及滅道智三識識欲界一切使使不苦不樂受業一界一入二陰攝七智知除法智及滅道智一識識色無色界一切遍使使及修斷使使三法竟身念處十一界十一入一陰攝八智知除知他心智及滅智六識識欲色二界一切遍使使及修斷使使受念處一界一入一陰攝九智知除滅智一識識一切使使心念處七界一入一陰攝九智知除滅智一識識一切使使法念處一界一入二陰攝十智知一識識一切使使復次身增上彼道生善有漏及無漏受心法增上彼道生善有漏及無漏四正勤四神足三界二入五陰攝九智知除滅智一識識三界一切遍使使及修斷使使禪三界二入五陰攝九智知除滅智一識識色界一切遍使使及修斷使使苦諦十八界十二入五陰攝八智知除滅道智六識識一切使使如苦諦集諦亦如是滅諦一界一入陰所不攝六智知除知他心智及苦集道智一識識使所不使道諦三界二入五陰攝七智知除苦集滅智一識識使所不使慈悲喜捨三界二入五陰攝七智知除法智及滅道智一識識色界一切遍使使及修斷使使空入處識入處無所有入處三界二入四陰攝七智知除法智知他心智滅智一識識無色界一切使使非想非非想入處三界二入四陰攝六智知除法智知他心智及滅道智一識識無色界一切使使四聖種三界二入五陰攝九智知除滅智一識識三界一切遍使使及修斷使使有為沙門果三界二入五陰攝七智知除苦集滅智一識識使所不使無為沙門果一界一入陰所不攝六智知除知他心智及苦集道智一識識使所不使法智一界一入一陰攝六智知除比智及苦集滅智一識識使所不使比智一界一入一陰攝六智知除法智及苦集滅智一識識使所不使知他心智一界一入一陰攝九智知除滅智一識識色界一切遍使使及修斷使使等智一界一入一陰攝八智知除滅道智一識識除見無漏緣餘一切使使餘智一界一入一陰攝七智知除苦集滅智一識識使所不使義辨及應辨一界一入一陰攝九智知除滅智一識識三界一切遍使使及修斷使使法辨及辭辨一界一入一陰攝八智知除滅道智一識識欲色二界一切遍使使及修斷使使因緣十八界十二入五陰攝九智知除滅智六識識一切使使次第緣八界二入四陰攝九智知除滅智一識識一切使使所緣緣及增上緣十八界十二入五陰攝十智知六識識一切使使摶食三界三入一陰攝六智知除比智知他心智及滅道智四識識欲界一切遍使使及修斷使使觸食及意思食一界一入一陰攝八智知除滅道智一識識一切使使識食七界一入一陰攝八智知除滅道智一識識一切使使欲流一界一入一陰攝七智知除比智及滅道智一識識欲界一切使使有流一界一入一陰攝七智知除法智及滅道智一識識色無色界一切使使見流一界一入一陰攝八智知除滅道智一識識見斷有漏緣使使除見相應無漏緣無明無明流一界一入一陰攝八智知除滅道智一識識除無漏緣無明餘一切使使如流軛亦如是欲取一界一入一陰攝七智知除比智及滅道智一識識欲界一切使使見取一界一入一陰攝八智知除滅道智一識識見斷有漏緣使使除見相應無漏緣無明戒取一界一入一陰攝八智知除滅道智一識識見苦斷一切使使見集斷一切遍使使乃至見道斷有漏緣使使我取廣說如有流過去法未來法現在法十八界十二入五陰攝九智知除滅智六識識一切使使非過去未來現在法一界一入陰所不攝六智知除知他心智及苦集道智一識識使所不使欲界繫法十八界十二入五陰攝七智知除比智及滅道智六識識欲界一切使使色界繫法十四界十入五陰攝七智知除法智及滅道智四識識色界一切使使無色界繫法三界二入四陰攝六智知除法智知他心智及滅道智一識識無色界一切使使不繫法三界二入五陰攝八智知除苦集智一識識使所不使善因法十八界十二入五陰攝九智知除滅智六識識三界一切遍使使及修斷使使不善因法十八界十二入五陰攝七智知除比智及滅道智六識識欲界一切使使無記因法十八界十二入五陰攝八智知除滅道智六識識一切使使非善因非不善因非無記因法一界一入陰所不攝六智知除知他心智及苦集道智一識識使所不使有緣緣法三界二入四陰攝九智知除滅智一識識有為緣使使無緣緣法八界二入四陰攝九智知除滅智一識識一切使使有緣緣無緣緣法三界二入四陰攝九智知除滅智一識識一切使使非有緣緣非無緣緣法十一界十一入二陰攝九智知除知他心智六識識有漏緣使使四法竟色陰十一界十一入一陰攝八智知除知他心智及滅智六識識欲色二界一切遍使使及修斷使使受陰想陰行陰一界一入三陰攝九智知除滅智一識識一切使使識陰七界一入一陰攝九智知除滅智一識識一切使使色盛陰十一界十一入一陰攝七智知除知他心智及滅道智六識識欲色二界一切遍使使及修斷使使受盛陰想盛陰行盛陰一界一入三陰攝八智知除滅道智一識識一切使使識盛陰七界一入一陰攝八智知除滅道智一識識一切使使地獄趣畜生餓鬼及人趣十八界十二入五陰攝七智知除比智及滅道智六識識欲界一切使使天趣十八界十二入五陰攝八智知除滅道智六識識三界一切使使見苦斷煩惱身一界一入一陰攝八智知除滅道智一識識見苦斷一切使使及見集斷一切遍使使見集斷煩惱身一界一入一陰攝八智知除滅道智一識識見集斷一切使使及見苦斷一切遍使使見滅斷煩惱身一界一入一陰攝八智知除滅道智一識識見滅斷有漏緣使使及一切遍使使見道斷煩惱身一界一入一陰攝八智知除滅道智一識識見道斷有漏緣使使及一切遍使使修斷煩惱身一界一入一陰攝八智知除滅道智一識識修斷一切使使及一切遍使使色法如色陰心法如識陰心法法一界一入三陰攝九智知除滅智一識識一切使使心不相應行一界一入一陰攝八智知除知他心智及滅智一識識有漏緣使使無為法廣說如果非果法五法竟地界一界一入一陰攝七智知除知他心智及滅道智二識識欲色二界一切遍使使及修斷使使如地界水界火界風界虛空界亦如是識界七界一入一陰攝八智知除滅道智一識識一切使使見苦斷法三界二入四陰攝八智知除滅道智一識識見苦斷一切使使及見集斷一切遍使使見集斷法三界二入四陰攝八智知除滅道智一識識見集斷一切使使及見苦斷一切遍使使見滅斷法三界二入四陰攝八智知除滅道智一識識見道斷一切使使及一切遍使使見道斷法三界二入四陰攝八智知除滅道智一識識見道斷一切使使及一切遍使使修斷法十八界十二入五陰攝八智知除滅道智六識識修斷一切使使及一切遍使使不斷法三界二入五陰攝八智知除苦集智一識識使所不使六法竟貪欲使及瞋恚使一界一入一陰攝七智知除比智及滅道智一識識欲界有漏緣使使有愛使一界一入一陰攝七智知除法智及滅道智一識識色無色界有漏緣使使慢使一界一入一陰攝八智知除滅道智一識識三界有漏緣使使無明使一界一入一陰攝八智知除滅道智一識識除無漏緣無明餘一切使使見使一界一入一陰攝八智知除滅道智一識識見斷有漏緣使使及見相應無漏緣無明疑使一界一入一陰攝八智知除滅道智一識識見斷有漏緣使使及疑相應無漏緣無明初識住處十八界十二入五陰攝七智知除比智及滅道智六識識欲界一切使使第二識住處十四界十入五陰攝七智知除法智及滅道智四識識色界一切使使第三第四識住處十一界十入五陰攝七智知除法智及滅道智一識識色界一切使使第五第六第七識住處三界二入四陰攝六智知除法智知他心智及滅道智一識識無色界一切使使七覺支品一界一入二陰攝七智知除苦集滅智一識識使所不使七法竟初解脫處及第二第三解脫處三界二入五陰攝七智知除法智及滅道智一識識色界一切遍使使及修斷使使空入處解脫識入處解脫無所有入處解脫三界二入四陰攝七智知除法智知他心智及滅智一識識無色界一切遍使使及修斷使使非想非非想入處解脫三界二入四陰攝六智知除法智知他心智及滅道智一識識無色界一切遍使使及修斷使使想受滅入處解脫一界一入一陰攝六智知除法智知他心智及滅道智一識識無色界一切遍使使及修斷使使八勝處入及八一切入處三界二入五陰攝七智知除法智及滅道智一識識色界一切遍使使及修斷使使道支中正語正業正命一界一入一陰攝六智知除知他心智及苦集滅智一識識使所不使諸餘道支一界一入一陰攝七智知除苦集滅智一識識使所不使八法竟貪欲結及慢結一界一入一陰攝八智知除滅道智一識識三界有漏緣使使瞋恚結一界一入一陰攝七智知除比智及滅道智一識識欲界有漏緣使使無明結如無明使見結如見使他取結一界一入一陰攝八智知除滅道智一識識見斷有漏緣使使疑結一界一入一陰攝八智知除滅道智一識識見斷有漏緣使使及疑相應無漏緣無明慳嫉二結一界一入一陰攝七智知除比智及滅道智一識識欲界一切遍使使及修斷使使初衆生居處如初識住處第二衆生居處如第二識住處第三第四第五衆生居處如第三第四識住處餘衆生居處如餘識住處九法竟空一切入處及識一切入處三界二入四陰攝六智知除法智知他心智及滅道智一識識無色界一切遍使使及修斷使使無學法中正語正業正命一界一入一陰攝六智知除知他心智及苦集滅智一識識使所不使餘無學法如餘道支十法竟有漏色十一界十一入一陰攝七智知除知他心智及滅道智六識識欲色二界一切遍使使及修斷使使有漏受想行一界一入三陰攝八智知除滅道智一識識一切使使有漏識如識界無漏色一界一入一陰攝六智知除知他心智及苦集滅智一識識使所不使無漏受想行一界一入三陰攝七智知除苦集滅智一識識使所不使無漏識二界一入一陰攝七智知除苦集智及滅智一識識使所不使無為法廣說如果非果法十一法竟眼入一界一入一陰攝七智知除知他心智及滅道智一識識欲色二界一切遍使使及修斷使使如眼入耳入鼻入舌入身入眼界耳界鼻界舌界身界眼根耳根鼻根舌根身根亦如是色入一界一入一陰攝七智知除知他心智及滅道智二識識欲色二界一切遍使使及修斷使使如色入聲入觸入色界聲界觸界亦如是香入一界一入一陰攝六智知除比智知他心智及滅道智二識識欲界一切遍使使及修斷使使如香入味入香界味界亦如是意入七界一入一陰攝九智知除滅智一識識一切使使如意入意界意根亦如是法入一界一入四陰攝十智知一識識一切使使如法入法界亦如是十二法竟眼識界二界一入一陰攝八智知除滅道智一識識欲色二界一切遍使使及修斷使使如眼識界耳識界身識界亦如是鼻識界二界一入一陰攝七智知除比智及滅道智一識識欲界一切遍使使及修斷使使如鼻識界舌識界亦如是意識界二界一入一陰攝九智知除滅智一識識一切使使十八法竟女根一界一入一陰攝六智知除比智知他心智及滅道智一識識欲界一切遍使使及修斷使使如女根男根亦如是命根一界一入一陰攝七智知除知他心智及滅道智一識識三界一切遍使使及修斷使使樂根一界一入一陰攝九智知除滅智一識識色界一切使使欲界一切遍使使及修斷使使苦根一界一入一陰攝七智知除比智及滅道智一識識欲界一切遍使使及修斷使使喜根一界一入一陰攝九智知除滅智一識識色界一切使使除欲界無漏緣疑及彼相應無明餘欲界一切使使憂根一界一入一陰攝七智知除比智及滅道智一識識欲界一切使使捨根一界一入一陰攝九智知除滅智一識識一切使使信根一界一入一陰攝九智知除滅智一識識三界一切遍使使及修斷使使如信根精進根念根定根慧根亦如是未知當知根三界二入三陰攝七智知除苦集滅智一識識使所不使如未知當知根已知根無知根亦如是二十二法竟欲界繫見苦斷使一界一入一陰攝七智知除比智及滅道智一識識欲界繫見苦斷一切使使及見集斷一切遍使使欲界繫見集斷使一界一入一陰攝七智知除比智及滅道智一識識欲界繫見集斷一切使使及見苦斷一切遍使使欲界繫見滅斷使一界一入一陰攝七智知除比智及滅道智一識識除欲界繫見滅斷無漏緣不共無明餘欲界繫見滅斷一切使使及一切遍使使欲界繫見道斷使一界一入一陰攝七智知除比智及滅道智一識識除欲界繫見道斷無漏緣不共無明餘欲界繫見道斷一切使使及一切遍使使欲界繫修斷使一界一入一陰攝七智知除比智及滅道智一識識欲界繫修斷一切使使及一切遍使使如欲界繫色界繫無色界繫亦如是色界差別者除法智無色界差別者六智知除法智知他心智滅道智餘如上說九十八使竟
